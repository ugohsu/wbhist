<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}wbhist{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-dot"></span> wbhist
      </a>
      <nav class="side-nav">
        <a class="side-link" href="{{ url_for('index') }}">プロジェクト一覧</a>
      </nav>
    </aside>
    <main class="main">
      <div class="content-inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
